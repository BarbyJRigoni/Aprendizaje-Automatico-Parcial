<svg width="680" height="400" viewBox="0 0 680 400" xmlns="http://www.w3.org/2000/svg">

  <!-- Línea superior decorativa -->
  <rect x="40" y="30" width="60" height="3" rx="2" fill="#3F51B5"/>

  <!-- Título principal -->
  <text x="40" y="75" font-family="sans-serif" font-size="20" font-weight="500" fill="#1a1a1a">Aprendizaje No Supervisado</text>
  <text x="40" y="102" font-family="sans-serif" font-size="20" font-weight="500" fill="#1a1a1a">aplicado al consumo de sustancias</text>
  <text x="40" y="129" font-family="sans-serif" font-size="20" font-weight="500" fill="#1a1a1a">psicoactivas en jóvenes</text>

  <!-- Subtítulo -->
  <text x="40" y="162" font-family="sans-serif" font-size="13" font-weight="400" fill="#666666">Enfoque nacional con perspectiva territorial en Tierra del Fuego</text>

  <!-- Línea divisoria -->
  <line x1="40" y1="185" x2="380" y2="185" stroke="#dddddd" stroke-width="0.5"/>

  <!-- Badges -->
  <rect x="40" y="200" width="70" height="22" rx="4" fill="#f5f5f5" stroke="#dddddd" stroke-width="0.5"/>
  <text x="75" y="215" font-family="sans-serif" font-size="11" fill="#666666" text-anchor="middle">K-Means</text>

  <rect x="120" y="200" width="70" height="22" rx="4" fill="#f5f5f5" stroke="#dddddd" stroke-width="0.5"/>
  <text x="155" y="215" font-family="sans-serif" font-size="11" fill="#666666" text-anchor="middle">DBSCAN</text>

  <rect x="200" y="200" width="50" height="22" rx="4" fill="#f5f5f5" stroke="#dddddd" stroke-width="0.5"/>
  <text x="225" y="215" font-family="sans-serif" font-size="11" fill="#666666" text-anchor="middle">PCA</text>

  <rect x="260" y="200" width="100" height="22" rx="4" fill="#f5f5f5" stroke="#dddddd" stroke-width="0.5"/>
  <text x="310" y="215" font-family="sans-serif" font-size="11" fill="#666666" text-anchor="middle">Random Forest</text>

  <!-- Métricas clave -->
  <text x="40" y="265" font-family="sans-serif" font-size="32" font-weight="500" fill="#3F51B5">6.592</text>
  <text x="40" y="283" font-family="sans-serif" font-size="11" fill="#666666">jóvenes analizados</text>

  <text x="160" y="265" font-family="sans-serif" font-size="32" font-weight="500" fill="#4CAF50">98,1%</text>
  <text x="160" y="283" font-family="sans-serif" font-size="11" fill="#666666">accuracy validación</text>

  <text x="290" y="265" font-family="sans-serif" font-size="32" font-weight="500" fill="#F44336">51,3%</text>
  <text x="290" y="283" font-family="sans-serif" font-size="11" fill="#666666">alto consumo en TDF</text>

  <!-- Línea inferior -->
  <line x1="40" y1="305" x2="380" y2="305" stroke="#dddddd" stroke-width="0.5"/>

  <!-- Footer -->
  <text x="40" y="325" font-family="sans-serif" font-size="11" fill="#aaaaaa">Aprendizaje Automático · Bárbara Jesabel Rigoni · 2026</text>

  <!-- MAPA ARGENTINA -->
  <g transform="translate(420, 15)">
    <path d="M60,10 L100,8 L125,20 L135,45 L140,75 L138,105 L132,135 L122,165 L108,195 L90,225 L72,252 L58,275 L48,298 L42,318 L38,338 L48,350 L62,348 L68,335 L62,322 L50,320 L42,328 L38,338 L48,350 L58,342 L65,325 L70,305 L78,282 L88,258 L102,232 L114,205 L118,188 L108,182 L96,170 L86,155 L80,138 L84,120 L90,100 L94,75 L88,50 L75,28 Z"
          fill="#f0f0f0" stroke="#cccccc" stroke-width="1"/>

    <!-- TDF destacada -->
    <circle cx="52" cy="337" r="22" fill="#3F51B5" opacity="0.08"/>
    <circle cx="52" cy="337" r="16" fill="#3F51B5" opacity="0.12"/>
    <circle cx="52" cy="337" r="10" fill="#3F51B5" opacity="0.2"/>
    <path d="M38,338 L48,350 L62,348 L68,335 L62,322 L50,320 L42,328 Z" fill="#3F51B5"/>
    <path d="M38,338 L48,350 L62,348 L68,335 L62,322 L50,320 L42,328 Z" fill="none" stroke="white" stroke-width="1.5"/>
    <circle cx="52" cy="337" r="5" fill="white"/>

    <!-- Línea y etiqueta TDF -->
    <line x1="68" y1="330" x2="110" y2="305" stroke="#3F51B5" stroke-width="1" stroke-dasharray="3,2"/>
    <rect x="95" y="290" width="60" height="22" rx="4" fill="#3F51B5"/>
    <text x="125" y="305" font-family="sans-serif" font-size="11" font-weight="500" fill="white" text-anchor="middle">Tierra del Fuego</text>
    <rect x="95" y="316" width="60" height="18" rx="4" fill="white" stroke="#3F51B5" stroke-width="0.5"/>
    <text x="125" y="328" font-family="sans-serif" font-size="10" fill="#3F51B5" text-anchor="middle">51,3% alto consumo</text>

    <!-- Clusters -->
    <circle cx="90" cy="75" r="4" fill="#4CAF50" opacity="0.7"/>
    <circle cx="100" cy="90" r="3" fill="#4CAF50" opacity="0.6"/>
    <circle cx="82" cy="88" r="5" fill="#4CAF50" opacity="0.8"/>
    <circle cx="95" cy="105" r="3" fill="#FF9800" opacity="0.7"/>
    <circle cx="108" cy="100" r="4" fill="#FF9800" opacity="0.6"/>
    <circle cx="90" cy="118" r="3" fill="#F44336" opacity="0.7"/>
    <circle cx="80" cy="128" r="4" fill="#F44336" opacity="0.6"/>

    <!-- Leyenda -->
    <circle cx="15" cy="155" r="5" fill="#4CAF50"/>
    <text x="25" y="159" font-family="sans-serif" font-size="10" fill="#666666">Bajo consumo</text>
    <circle cx="15" cy="173" r="5" fill="#FF9800"/>
    <text x="25" y="177" font-family="sans-serif" font-size="10" fill="#666666">Moderado</text>
    <circle cx="15" cy="191" r="5" fill="#F44336"/>
    <text x="25" y="195" font-family="sans-serif" font-size="10" fill="#666666">Alto consumo</text>
